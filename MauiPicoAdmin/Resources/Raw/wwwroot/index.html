<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <title>PicoServer Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container">

    <h1 class="mt-4">PicoServer Admin</h1>

    <div class="mt-4">
        
        <button onclick="loadTime()" class="btn btn-primary">获取服务器时间</button>

        <a href="search.html" class="btn btn-primary">
            搜索商品
        </a>

        <a href="product.html" class="btn btn-primary">
            商品管理
        </a>

        <a href="ws.html" class="btn btn-primary">
            WebSocket/SSE
        </a>

    </div>

    <p id="result"></p>

    <script>

        async function loadTime() {
            let res = await fetch("/api/time");
            let data = await res.json();

            document.getElementById("result").innerText = data.data.time;
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log("SW registered");
                });
        }

    </script>
</body>
</html>
